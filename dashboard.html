<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Meow HRMS</title>
    <meta name="description" content="HRMS Dashboard - Manage your attendance, leave requests, profile and payroll.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo-small">Meow <span>HRMS</span></h2>
            </div>

            <div class="user-info">
                <div class="avatar" id="sidebar-avatar">U</div>
                <div class="details">
                    <p class="name" id="sidebar-name">User Name</p>
                    <p class="role" id="sidebar-role">Role</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#overview" class="nav-item active" data-view="overview">
                    <span class="icon">📊</span> Overview
                </a>
                <a href="#profile" class="nav-item" data-view="profile">
                    <span class="icon">👤</span> Profile
                </a>
                <a href="#attendance" class="nav-item" data-view="attendance">
                    <span class="icon">⏰</span> Attendance
                </a>
                <a href="#leave" class="nav-item" data-view="leave">
                    <span class="icon">🏖️</span> Leave
                </a>
                <a href="#payroll" class="nav-item" data-view="payroll">
                    <span class="icon">💰</span> Payroll
                </a>

                <!-- Admin Only Nav Items -->
                <div id="admin-nav" class="hidden">
                    <div class="nav-separator">Administration</div>
                    <a href="#admin-employees" class="nav-item" data-view="admin-employees">
                        <span class="icon">👥</span> Employees
                    </a>
                    <a href="#admin-approvals" class="nav-item" data-view="admin-approvals">
                        <span class="icon">✅</span> Approvals
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-outline btn-block btn-sm">Logout</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <h1 id="page-title">Overview</h1>
                <div class="topbar-actions">
                    <span class="date-display" id="current-date"></span>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Views will be dynamically loaded here by JS -->
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/store.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/modules/profile.js"></script>
    <script src="js/modules/attendance.js"></script>
    <script src="js/modules/leave.js"></script>
    <script src="js/modules/payroll.js"></script>
</body>

</html>
