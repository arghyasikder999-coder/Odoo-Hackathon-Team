<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow HRMS - Human Resource Management System</title>
    <meta name="description"
        content="Meow HRMS - A modern human resource management system for attendance, leave, and payroll management.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body class="auth-body">

    <div class="auth-container">
        <div class="auth-header">
            <h1 class="logo">Meow <span>HRMS</span></h1>
            <p>Every workday, perfectly aligned.</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
            <h2>Welcome back</h2>
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="name@company.com" autocomplete="email" autocapitalize="none" autocorrect="off" spellcheck="false">
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="Enter your password"
                    autocomplete="current-password">
            </div>
            <div class="error-message" id="login-error"></div>
            <button type="submit" class="btn btn-primary btn-block">Sign In →</button>
            <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Create one</a></p>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form hidden">
            <h2>Create account</h2>
            <div class="input-group">
                <label for="signup-empid">Employee ID</label>
                <input type="text" id="signup-empid" required placeholder="EMP-001">
            </div>
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" required placeholder="John Doe" autocomplete="name">
            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" required placeholder="name@company.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" required placeholder="Min 6 characters"
                    autocomplete="new-password">
            </div>
            <div class="input-group">
                <label for="signup-department">Department</label>
                <select id="signup-department" required>
                    <option value="Engineering">Engineering</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Sales">Sales</option>
                    <option value="Finance">Finance</option>
                    <option value="HR">Human Resources</option>
                    <option value="Operations">Operations</option>
                </select>
            </div>
            <div class="input-group">
                <label for="signup-role">Role</label>
                <select id="signup-role" required>
                    <option value="Employee">Employee</option>
                    <option value="Admin">Admin / HR Officer</option>
                </select>
            </div>
            <div class="error-message" id="signup-error"></div>
            <button type="submit" class="btn btn-primary btn-block">Create Account →</button>
            <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign In</a></p>
        </form>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
